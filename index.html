<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイ・ラジオ体操カード Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #ffffff; --text: #000000; --stamp: #ff0000; }
        body { 
            background-color: var(--bg); color: var(--text); 
            font-family: sans-serif; margin: 0; padding: 10px; text-align: center;
            transition: background 0.3s, color 0.3s;
        }
        .container { max-width: 500px; margin: 0 auto; }
        
        /* ユーザー情報エリア */
        .user-profile {
            display: flex; align-items: center; justify-content: flex-end;
            gap: 8px; margin-bottom: 10px; font-size: 0.75rem;
        }
        .user-avatar {
            width: 28px; height: 28px; border-radius: 50%;
            background: #eee; border: 1px solid #ccc; object-fit: cover;
        }
        .user-name { font-weight: bold; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .btn-auth { font-size: 0.7rem; padding: 4px 10px; border-radius: 12px; border: 1px solid #ccc; cursor: pointer; background: #fff; color: #333; }

        #video-frame {
            width: 100%; aspect-ratio: 16/9; background: #333;
            border-radius: 12px; overflow: hidden; margin: 10px 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center;
        }
        #player { width: 100%; height: 100%; }

        .grid-header { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 5px; font-weight: bold; font-size: 0.7rem; }
        .grid-header div:nth-child(1) { color: #ff5555; }
        .grid-header div:nth-child(7) { color: #5555ff; }

        .grid-body { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; background: rgba(0,0,0,0.05); padding: 8px; border-radius: 8px; border: 1px solid var(--text); margin-bottom: 15px; }
        
        .cell { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; position: relative; border-radius: 50%; }
        .is-today { background: var(--stamp); color: #fff !important; font-weight: bold; box-shadow: 0 0 10px var(--stamp); }

        .stamp-box { border: 1px solid var(--text); border-radius: 4px; background: rgba(255,255,255,0.5); aspect-ratio: 1/1; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .st-mark {
            width: 80%; height: 80%; background: var(--stamp); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: bold; position: absolute; visibility: hidden; font-size: 0.7rem; z-index: 2;
        }
        .is-done .st-mark { visibility: visible; }

        /* モーダル */
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .modal-inner { background: #fff; color: #333; padding: 20px; border-radius: 15px; width: 90%; max-width: 350px; text-align: left; max-height: 90vh; overflow-y: auto; }
        input { width: 100%; padding: 10px; margin: 5px 0 15px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        
        .color-row { display: flex; align-items: center; justify-content: space-between; padding: 8px; border: 1px solid #eee; cursor: pointer; border-radius: 8px; margin-bottom: 5px; }
        .sw-circle { width: 25px; height: 25px; border-radius: 50%; border: 1px solid #ccc; }
        
        .btn-save { background: #ff0000; color: #fff; border: none; padding: 15px; border-radius: 30px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 15px; }
        .btn-modal-login { background: #4285F4; color: #fff; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 15px; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="user-profile">
        <img id="display-avatar" class="user-avatar" src="https://via.placeholder.com/28?text=?" alt="User">
        <span id="display-name" class="user-name">ゲスト</span>
        <button id="btn-login" class="btn-auth" onclick="login()">ログイン</button>
        <button id="btn-logout" class="btn-auth hidden" onclick="logout()">ログアウト</button>
    </div>

    <header>
        <h1 id="view-goal" style="font-size:1.2rem; margin:10px 0;">目標を設定してください</h1>
        <div style="font-weight:bold;">🔥 連続 <span id="streak-num" style="font-size:2rem; color:var(--stamp);">0</span> 日</div>
        <button onclick="openConfig()" style="margin:10px; cursor:pointer; padding:8px 20px; border-radius:20px; border:1px solid #ccc; background:#fff;">⚙️ 設定画面を開く</button>
    </header>

    <div id="video-frame"><div id="player"></div></div>

    <h3 style="text-align:left; font-size:0.9rem; margin-bottom:5px;">📅 カレンダー (今日)</h3>
    <div class="grid-header"><div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div></div>
    <div id="cal-grid" class="grid-body"></div>

    <h3 style="text-align:left; font-size:0.9rem; margin-bottom:5px;">💮 ラジオ体操カード</h3>
    <div class="grid-header"><div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div></div>
    <div id="stamp-grid" class="grid-body"></div>
</div>

<div id="modal" class="hidden">
    <div class="modal-inner">
        <h3 style="margin:0 0 15px; text-align:center;">アプリ設定</h3>
        
        <div id="modal-auth-notice">
            <p style="font-size: 0.8rem; color: #d32f2f; margin-bottom: 8px; font-weight: bold;">⚠️ 現在未ログインです。データが保存されません。</p>
            <button class="btn-modal-login" onclick="login()">Googleでログインする</button>
            <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 15px;">
        </div>

        <label style="font-weight:bold; font-size:0.8rem;">目標</label>
        <input type="text" id="in-goal">
        
        <label style="font-weight:bold; font-size:0.8rem;">YouTube URL</label>
        <input type="text" id="in-url">
        
        <label style="font-weight:bold; font-size:0.8rem;">ハンコ文字</label>
        <input type="text" id="in-stamp" maxlength="2" placeholder="済">
        
        <div class="color-row" onclick="pick('bg')">背景色 <div id="v-bg" class="sw-circle"></div></div>
        <div class="color-row" onclick="pick('text')">文字色 <div id="v-text" class="sw-circle"></div></div>
        <div class="color-row" onclick="pick('stamp')">ハンコ色 <div id="v-stamp" class="sw-circle"></div></div>
        
        <div id="palette" class="hidden"></div>
        <button onclick="saveAll()" class="btn-save">設定を保存して閉じる</button>
    </div>
</div>

<script>
const S_URL = 'https://fzuqxlixsyoieljykdxy.supabase.co';
const S_KEY = 'Sb_publishable_7MHTvw7L3omsRpjAIcTSJA_KcfdRi8q';
const sb = supabase.createClient(S_URL, S_KEY);

let player, active = 'bg', apiReady = false, currentUser = null;
let conf = { bg: '#ffffff', text: '#000000', stamp: '#ff0000', goal: '', url: '', stampTxt: '済' };

const tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
document.head.appendChild(tag);

window.onYouTubeIframeAPIReady = () => { apiReady = true; if(conf.url) initPlayer(conf.url); };

async function login() {
    await sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href } });
}

async function logout() { await sb.auth.signOut(); location.reload(); }

// ログイン状態を監視してUIを更新
sb.auth.onAuthStateChange((event, session) => {
    const nameEl = document.getElementById('display-name');
    const avatarEl = document.getElementById('display-avatar');
    
    if (session) {
        currentUser = session.user;
        // 名前と画像を表示
        nameEl.innerText = currentUser.user_metadata.full_name || "ユーザー";
        avatarEl.src = currentUser.user_metadata.avatar_url || "https://via.placeholder.com/28";
        
        document.getElementById('btn-login').classList.add('hidden');
        document.getElementById('btn-logout').classList.remove('hidden');
        document.getElementById('modal-auth-notice').classList.add('hidden');
        syncData();
    } else {
        currentUser = null;
        nameEl.innerText = "未ログイン";
        avatarEl.src = "https://via.placeholder.com/28?text=?";
        
        document.getElementById('btn-login').classList.remove('hidden');
        document.getElementById('btn-logout').classList.add('hidden');
        document.getElementById('modal-auth-notice').classList.remove('hidden');
        renderGrids([]);
    }
});

window.onload = () => { buildPalette(); renderGrids([]); applyUI(); };

function initPlayer(url) {
    if(!apiReady) return;
    const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
    const match = url.match(regExp);
    const id = (match && match[2].length === 11) ? match[2] : null;
    if(!id) return;
    if(player && player.loadVideoById) {
        player.loadVideoById(id);
    } else {
        player = new YT.Player('player', {
            videoId: id, playerVars: { 'playsinline': 1 },
            events: { 'onStateChange': (e) => { if(e.data === YT.PlayerState.ENDED) registerDone(); } }
        });
    }
}

function buildPalette() {
    const p = document.getElementById('palette');
    const hues = [null, 280, 210, 180, 120, 60, 35, 0, 330, 305];
    hues.forEach(h => {
        for(let i=0; i<10; i++) {
            const d = document.createElement('div');
            d.className = 'dot';
            const c = (h === null) ? `rgb(${i*28},${i*28},${i*28})` : `hsl(${h}, 85%, ${20+(i*7)}%)`;
            d.style.background = c;
            d.onclick = () => { conf[active]=c; applyUI(); p.classList.add('hidden'); };
            p.appendChild(d);
        }
    });
}

function pick(k) { active = k; document.getElementById('palette').classList.toggle('hidden'); }

function applyUI() {
    document.documentElement.style.setProperty('--bg', conf.bg);
    document.documentElement.style.setProperty('--text', conf.text);
    document.documentElement.style.setProperty('--stamp', conf.stamp);
    document.getElementById('view-goal').innerText = conf.goal || "目標を設定してください";
    document.getElementById('v-bg').style.background = conf.bg;
    document.getElementById('v-text').style.background = conf.text;
    document.getElementById('v-stamp').style.background = conf.stamp;
    if(conf.url && apiReady) initPlayer(conf.url);
}

async function saveAll() {
    conf.goal = document.getElementById('in-goal').value;
    conf.url = document.getElementById('in-url').value;
    conf.stampTxt = document.getElementById('in-stamp').value || '済';
    applyUI();
    document.getElementById('modal').classList.add('hidden');
    
    if(currentUser) {
        await sb.from('user_settings').upsert({
            user_id: currentUser.id, goal_text: conf.goal, video_url: conf.url,
            bg_color: conf.bg, text_color: conf.text, stamp_color: conf.stamp, font_family: conf.stampTxt
        });
        syncData();
    }
}

async function syncData() {
    if(!currentUser) return;
    const { data: settings } = await sb.from('user_settings').select('*').eq('user_id', currentUser.id).maybeSingle();
    if(settings) {
        conf = { bg: settings.bg_color, text: settings.text_color, stamp: settings.stamp_color, goal: settings.goal_text, url: settings.video_url, stampTxt: settings.font_family };
        applyUI();
    }
    const { data: stamps } = await sb.from('daily_stamps').select('stamped_date').eq('user_id', currentUser.id);
    const dates = stamps?.map(d => d.stamped_date) || [];
    renderGrids(dates);
    document.getElementById('streak-num').innerText = dates.length;
}

function renderGrids(stamped) {
    const now = new Date(), y = now.getFullYear(), m = now.getMonth();
    const todayStr = now.toISOString().split('T')[0];
    const lastD = new Date(y, m+1, 0).getDate();
    const startW = new Date(y, m, 1).getDay();

    const draw = (id, isCard) => {
        const g = document.getElementById(id); if(!g) return;
        g.innerHTML = '';
        for(let i=0; i<startW; i++) g.appendChild(document.createElement('div'));
        for(let d=1; d<=lastD; d++) {
            const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const c = document.createElement('div');
            c.className = isCard ? `stamp-box ${stamped.includes(dateStr)?'is-done':''}` : `cell ${dateStr===todayStr?'is-today':''}`;
            c.innerHTML = isCard ? `<div class="st-mark">${conf.stampTxt}</div>${d}` : d;
            g.appendChild(c);
        }
    };
    draw('cal-grid', false); draw('stamp-grid', true);
}

async function registerDone() {
    if(!currentUser) return alert("ログインしていないためスタンプを保存できません");
    const s = new Date().toISOString().split('T')[0];
    const { error } = await sb.from('daily_stamps').insert({stamped_date:s, user_id: currentUser.id});
    if(!error) { syncData(); alert("スタンプ完了！"); }
}

function openConfig() {
    document.getElementById('modal').classList.remove('hidden');
    document.getElementById('in-goal').value = conf.goal;
    document.getElementById('in-url').value = conf.url;
    document.getElementById('in-stamp').value = conf.stampTxt;
}
</script>
</body>
</html>
